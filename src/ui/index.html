<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Claude Remote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-search@0.13.0/lib/xterm-addon-search.js"></script>
    <style>
        :root {
            --bg-term: #0a0e14;
            --bg-titlebar: #161b22;
            --border: rgba(48, 54, 61, 0.6);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --text-muted: #484f58;
            --green: #3fb950;
            --cyan: #39d0d8;
            --amber: #d29922;
            --red: #f85149;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #000;
            color: var(--text);
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Title bar */
        .titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-titlebar);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .titlebar-dots {
            display: flex;
            gap: 6px;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-red { background: var(--red); }
        .dot-amber { background: var(--amber); }
        .dot-green { background: var(--green); }

        .titlebar-title {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 8px;
        }

        .titlebar-status {
            font-size: 11px;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Terminal pane */
        .terminal {
            flex: 1;
            background: var(--bg-term);
            overflow: hidden;
            position: relative;
        }

        .terminal-content {
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text);
            height: 100%;
            padding: 12px 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .terminal-content::-webkit-scrollbar { width: 6px; }
        .terminal-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* xterm.js focus indicator */
        .xterm.xterm-focus { outline: 1px solid var(--cyan); outline-offset: -1px; }

        /* Prevent iOS zoom on xterm hidden input */
        .xterm-helper-textarea { font-size: 16px !important; }

        /* Empty state */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 12px;
        }

        .empty-icon { font-size: 32px; opacity: 0.4; }
        .empty-title { font-size: 14px; }
        .empty-hint { font-size: 12px; color: var(--text-muted); }

        /* Toast */
        .toast-wrap {
            position: fixed;
            bottom: 160px;
            left: 50%; transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            padding: 8px 16px;
            background: var(--bg-titlebar);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--green);
            animation: fadeIn 0.2s ease-out;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        .toast.error { color: var(--red); border-color: rgba(248,81,73,0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Footer */
        .footer {
            padding: 6px 16px;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
            background: var(--bg-titlebar);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .footer-hint { color: var(--text-dim); cursor: pointer; }
        .footer-hint:active { color: var(--cyan); }

        /* History view */
        .history-list {
            padding: 8px 0;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child { border-bottom: none; }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .history-event {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-event.permission { color: var(--amber); }
        .history-event.idle { color: var(--text-dim); }

        .history-time {
            font-size: 10px;
            color: var(--text-muted);
        }

        .history-message {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-response {
            font-size: 11px;
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .history-response.dismissed {
            background: rgba(210, 153, 34, 0.15);
            color: var(--amber);
        }

        .history-back {
            text-align: center;
            padding: 12px;
            color: var(--cyan);
            font-size: 12px;
            cursor: pointer;
        }

        .history-back:active { opacity: 0.6; }

        .history-empty {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Quick-action keyboard bar */
        .quickbar {
            display: none;
            flex-shrink: 0;
            background: var(--bg-titlebar);
            border-top: 1px solid var(--border);
            padding: 6px 8px;
        }

        .quickbar.visible {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .quickbar-row {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .qbtn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            min-width: 44px;
            min-height: 44px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            flex: 1;
            max-width: 72px;
            transition: background 0.1s ease, border-color 0.1s ease;
        }

        .qbtn:active {
            background: rgba(57, 208, 216, 0.15);
            border-color: var(--cyan);
            color: var(--text);
        }

        .qbtn-primary {
            color: var(--green);
            border-color: rgba(63, 185, 80, 0.3);
            font-weight: 600;
            font-size: 14px;
        }

        .qbtn-primary:active {
            background: rgba(63, 185, 80, 0.2);
            border-color: var(--green);
        }

        .qbtn-dim { color: var(--text-muted); }

        .qbtn-special { font-size: 11px; }

        .qbtn-arrow {
            font-size: 16px;
            max-width: 44px;
            color: var(--text-muted);
        }

        .quickbar.sending .qbtn {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Search bar */
        .searchbar {
            display: none;
            background: var(--bg-titlebar);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .searchbar.visible { display: flex; }

        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--cyan);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
            min-width: 40px;
        }

        .search-btn:active {
            background: rgba(57, 208, 216, 0.15);
            border-color: var(--cyan);
        }

        .search-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .search-count {
            font-size: 11px;
            color: var(--text-muted);
            min-width: 50px;
            text-align: center;
        }

        /* Toolbar buttons in titlebar */
        .titlebar-tools {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        .tool-btn:active {
            background: rgba(57, 208, 216, 0.15);
            color: var(--cyan);
        }

        .tool-btn.active {
            color: var(--cyan);
        }

        @supports (padding: max(0px)) {
            .titlebar { padding-top: max(8px, env(safe-area-inset-top)); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="titlebar">
            <div class="titlebar-left">
                <div class="titlebar-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-amber"></div>
                    <div class="dot dot-green"></div>
                </div>
                <span class="titlebar-title" id="titleText">claude-remote</span>
            </div>
            <div class="titlebar-tools">
                <button class="tool-btn" id="searchToggle" title="Search">🔍</button>
                <button class="tool-btn" id="copyBtn" title="Copy">📋</button>
            </div>
            <div class="titlebar-status">
                <div class="status-dot"></div>
                <span id="statusText">connected</span>
            </div>
        </div>

        <div class="searchbar" id="searchbar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off" autocorrect="off" autocapitalize="off">
            <span class="search-count" id="searchCount"></span>
            <button class="search-btn" id="searchPrev">↑</button>
            <button class="search-btn" id="searchNext">↓</button>
            <button class="search-btn" id="searchClose">✕</button>
        </div>

        <div class="terminal" id="terminal">
            <div id="xtermContainer" style="display:none; width:100%; height:100%;"></div>
            <div class="terminal-content" id="termContent"></div>
            <!-- Hidden input for iOS soft keyboard -->
            <input type="text" id="mobileInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                   style="position:absolute; bottom:10px; left:50%; width:1px; height:1px; opacity:0; font-size:16px; pointer-events:none;">
        </div>

        <div class="quickbar" id="quickbar">
            <div class="quickbar-row">
                <button class="qbtn qbtn-primary" data-key="y">y</button>
                <button class="qbtn qbtn-primary" data-key="n">n</button>
                <button class="qbtn qbtn-dim" data-key="1">1</button>
                <button class="qbtn qbtn-dim" data-key="2">2</button>
                <button class="qbtn qbtn-dim" data-key="3">3</button>
            </div>
            <div class="quickbar-row">
                <button class="qbtn qbtn-special" data-key="Enter">Enter</button>
                <button class="qbtn qbtn-special" data-key="Escape">Esc</button>
                <button class="qbtn qbtn-special" data-key="C-c">^C</button>
                <button class="qbtn qbtn-special" data-key="Tab">Tab</button>
                <button class="qbtn qbtn-arrow" data-key="Up">&uarr;</button>
                <button class="qbtn qbtn-arrow" data-key="Down">&darr;</button>
            </div>
        </div>

        <div class="toast-wrap" id="toastWrap"></div>

        <div class="footer">
            <span id="footerLeft">No pending prompts</span>
            <span class="footer-hint" id="footerHint">tap terminal to type</span>
        </div>
    </div>

    <script>
        const POLL_INTERVAL = 3000;
        const WS_RECONNECT_BASE = 1000;
        const WS_RECONNECT_MAX = 30000;
        const API_BASE = '';

        let currentPrompt = null;
        let pollTimer = null;
        let isSending = false;
        let userHasTapped = false;
        let showingHistory = false;
        let ws = null;
        let wsReconnectDelay = WS_RECONNECT_BASE;
        let wsReconnectTimer = null;
        let usingWebSocket = false;
        let terminalLive = false;
        let terminalSession = null;

        // xterm.js state
        let term = null;
        let fitAddon = null;
        let searchAddon = null;
        let lastWrittenContent = '';
        let searchResultCount = 0;
        let searchResultIndex = -1;

        const terminal = document.getElementById('terminal');
        const termContent = document.getElementById('termContent');
        const xtermContainer = document.getElementById('xtermContainer');
        const mobileInput = document.getElementById('mobileInput');
        const titleText = document.getElementById('titleText');
        const statusText = document.getElementById('statusText');
        const footerLeft = document.getElementById('footerLeft');
        const footerHint = document.getElementById('footerHint');
        const toastWrap = document.getElementById('toastWrap');
        const quickbar = document.getElementById('quickbar');
        const statusDot = statusText.parentElement.querySelector('.status-dot');

        // Search elements
        const searchToggle = document.getElementById('searchToggle');
        const searchbar = document.getElementById('searchbar');
        const searchInput = document.getElementById('searchInput');
        const searchCount = document.getElementById('searchCount');
        const searchPrev = document.getElementById('searchPrev');
        const searchNext = document.getElementById('searchNext');
        const searchClose = document.getElementById('searchClose');
        const copyBtn = document.getElementById('copyBtn');

        // ── xterm.js ──────────────────────────────────────────

        function initXterm() {
            if (term) return;

            term = new Terminal({
                allowProposedApi: true,
                theme: {
                    background: '#0a0e14',
                    foreground: '#e6edf3',
                    cursor: '#e6edf3',
                    cursorAccent: '#0a0e14',
                    selectionBackground: 'rgba(57, 208, 216, 0.3)',
                    black: '#484f58',
                    red: '#f85149',
                    green: '#3fb950',
                    yellow: '#d29922',
                    blue: '#58a6ff',
                    magenta: '#bc8cff',
                    cyan: '#39d0d8',
                    white: '#e6edf3',
                    brightBlack: '#6e7681',
                    brightRed: '#ffa198',
                    brightGreen: '#56d364',
                    brightYellow: '#e3b341',
                    brightBlue: '#79c0ff',
                    brightMagenta: '#d2a8ff',
                    brightCyan: '#56d4dd',
                    brightWhite: '#ffffff'
                },
                convertEol: true,
                fontSize: 13,
                fontFamily: "'JetBrains Mono', monospace",
                scrollback: 1000,
                cursorBlink: true
            });

            fitAddon = new FitAddon.FitAddon();
            searchAddon = new SearchAddon.SearchAddon();
            term.loadAddon(fitAddon);
            term.loadAddon(new WebLinksAddon.WebLinksAddon());
            term.loadAddon(searchAddon);

            term.open(xtermContainer);
            fitAddon.fit();

            // Route keystrokes to sendKey (prompt) or sendKeyDirect (watching)
            term.onData((data) => {
                if (!userHasTapped) return;

                let key;
                if (data === '\r') key = 'Enter';
                else if (data === '\x1b') key = 'Escape';
                else if (data === '\x03') key = 'C-c';
                else key = data;

                if (currentPrompt) {
                    sendKey(key);
                } else if (terminalLive) {
                    sendKeyDirect(key);
                }
            });

            // Resize handler
            window.addEventListener('resize', () => {
                if (fitAddon && xtermContainer.style.display !== 'none') {
                    fitAddon.fit();
                }
            });
        }

        // ── Prompt handling ───────────────────────────────────

        // Shared prompt update handler (used by both WS and HTTP)
        function handlePromptsUpdate(prompts) {
            if (prompts.length > 0) {
                const prompt = prompts[0];
                if (!currentPrompt || currentPrompt.id !== prompt.id) {
                    currentPrompt = prompt;
                    userHasTapped = false;
                    if (!showingHistory) renderPromptOverlay();
                } else {
                    currentPrompt = prompt;
                    if (!showingHistory) renderPromptOverlay();
                }
            } else if (currentPrompt) {
                currentPrompt = null;
                if (!showingHistory) {
                    if (terminalLive) {
                        // Return to watching state — update chrome only
                        footerLeft.textContent = 'Watching session';
                        footerHint.textContent = 'history';
                        updateQuickbar();
                    } else {
                        renderNoSession();
                    }
                }
            }

            statusDot.style.background = 'var(--green)';
        }

        // ── WebSocket ─────────────────────────────────────────

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws`;

            try {
                ws = new WebSocket(wsUrl);
            } catch (e) {
                startPolling();
                return;
            }

            ws.onopen = () => {
                usingWebSocket = true;
                wsReconnectDelay = WS_RECONNECT_BASE;
                stopPolling();
                statusText.textContent = 'live';
                statusDot.style.background = 'var(--green)';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'prompts') {
                        handlePromptsUpdate(data.prompts);
                    } else if (data.type === 'terminal') {
                        handleTerminalUpdate(data.content, data.session);
                    }
                } catch (e) {
                    console.error('WS parse error:', e);
                }
            };

            ws.onclose = () => {
                usingWebSocket = false;
                ws = null;
                statusText.textContent = 'polling';
                startPolling();

                wsReconnectTimer = setTimeout(() => {
                    wsReconnectDelay = Math.min(wsReconnectDelay * 2, WS_RECONNECT_MAX);
                    connectWebSocket();
                }, wsReconnectDelay);
            };

            ws.onerror = () => {};
        }

        // ── HTTP polling (fallback) ──────────────────────────

        async function poll() {
            if (usingWebSocket) return;

            try {
                const res = await fetch(`${API_BASE}/api/prompts`);
                const data = await res.json();
                if (data.success) handlePromptsUpdate(data.prompts);
            } catch {
                statusText.textContent = 'disconnected';
                statusDot.style.background = 'var(--red)';
            }
        }

        function startPolling() {
            if (pollTimer) return;
            poll();
            pollTimer = setInterval(poll, POLL_INTERVAL);
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        // ── Terminal broadcast handling ────────────────────────

        function handleTerminalUpdate(content, session) {
            if (content === null) {
                // No active session
                terminalLive = false;
                terminalSession = null;
                if (!showingHistory && !currentPrompt) renderNoSession();
                return;
            }

            terminalLive = true;
            terminalSession = session;

            if (showingHistory) return;

            // Show xterm container
            xtermContainer.style.display = '';
            termContent.style.display = 'none';
            initXterm();

            // Fit before writing to ensure proper dimensions (with RAF for mobile layout)
            requestAnimationFrame(() => {
                fitAddon.fit();

                // Only rewrite if content changed
                if (content !== lastWrittenContent) {
                    term.clear();
                    term.write(content);
                    lastWrittenContent = content;

                    // Re-apply active search after content update
                    if (searchbar.classList.contains('visible') && searchInput.value) {
                        setTimeout(() => doSearch('next'), 50);
                    }
                }
            });

            // Update chrome based on state
            titleText.textContent = session || 'claude-remote';
            if (!currentPrompt) {
                footerLeft.textContent = 'Watching session';
                footerHint.textContent = 'history';
                updateQuickbar();
            }
        }

        // ── Rendering ─────────────────────────────────────────

        function renderPromptOverlay() {
            const p = currentPrompt;

            // If terminal broadcast hasn't started yet, show prompt's terminal content
            if (!terminalLive) {
                const content = (p.terminal || p.terminal_content || '').trim();
                xtermContainer.style.display = '';
                termContent.style.display = 'none';
                initXterm();
                if (content && content !== lastWrittenContent) {
                    term.reset();
                    term.write(content);
                    lastWrittenContent = content;
                }
                fitAddon.fit();
            }

            // Update chrome for prompt state
            const session = p.tmux_session || terminalSession || 'claude-remote';
            titleText.textContent = session;
            footerLeft.textContent = p.event === 'permission_prompt' ? 'Permission required' : 'Waiting for input';
            footerHint.textContent = 'tap to type \u00b7 keys sent to session';
            updateQuickbar();
        }

        function renderNoSession() {
            xtermContainer.style.display = 'none';
            termContent.style.display = '';
            lastWrittenContent = '';

            termContent.innerHTML = '';
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.innerHTML = '<div class="empty-icon">\u25c7</div>'
                + '<div class="empty-title">No active session</div>'
                + '<div class="empty-hint">Start a claude-remote session to begin</div>';
            termContent.appendChild(empty);

            titleText.textContent = 'claude-remote';
            footerLeft.textContent = 'No active session';
            footerHint.textContent = 'history';
            updateQuickbar();
        }

        // ── Input ─────────────────────────────────────────────

        async function sendKey(key) {
            if (!currentPrompt || isSending) return;
            isSending = true;
            quickbar.classList.add('sending');

            try {
                const res = await fetch(`${API_BASE}/api/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentPrompt.id,
                        response: key,
                        noEnter: true
                    })
                });

                const data = await res.json();
                if (data.success) {
                    showToast('Sent: ' + (key || 'Enter'));
                    currentPrompt = null;
                    if (!showingHistory) {
                        if (terminalLive) {
                            footerLeft.textContent = 'Watching session';
                            footerHint.textContent = 'history';
                            updateQuickbar();
                        } else {
                            renderNoSession();
                        }
                    }
                    if (!usingWebSocket) setTimeout(poll, 1000);
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch (err) {
                showToast('Connection error', true);
            } finally {
                isSending = false;
                quickbar.classList.remove('sending');
            }
        }

        async function sendKeyDirect(key) {
            if (!terminalLive || isSending) return;
            isSending = true;

            try {
                const res = await fetch(`${API_BASE}/api/keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await res.json();
                if (!data.success) {
                    showToast(data.error || 'Failed', true);
                }
            } catch {
                showToast('Connection error', true);
            } finally {
                isSending = false;
            }
        }

        // Focus management — require explicit tap
        // Use hidden input for iOS soft keyboard
        terminal.addEventListener('click', () => {
            userHasTapped = true;
            // Focus hidden input to trigger iOS keyboard
            mobileInput.focus();
            showToast('Keyboard active');
        });

        // Handle input from iOS soft keyboard
        mobileInput.addEventListener('input', (e) => {
            const value = e.target.value;
            if (!value) return;

            // Clear input immediately to prepare for next input
            mobileInput.value = '';

            // Send the typed text
            if (currentPrompt) {
                // For prompts, send the whole value
                sendKey(value);
            } else if (terminalLive) {
                // For watching mode, send directly
                sendKeyDirect(value);
            }
        });

        // Handle special keys (Enter, Backspace) via keydown
        mobileInput.addEventListener('keydown', (e) => {
            let key = null;

            if (e.key === 'Enter') {
                key = 'Enter';
                e.preventDefault();
            } else if (e.key === 'Backspace') {
                key = '\x7f'; // DEL character
                e.preventDefault();
            } else if (e.key === 'Escape') {
                key = 'Escape';
                e.preventDefault();
            }

            if (key) {
                if (currentPrompt) {
                    sendKey(key);
                } else if (terminalLive) {
                    sendKeyDirect(key);
                }
            }
        });

        // ── Quick-action bar ──────────────────────────────────

        quickbar.addEventListener('click', (e) => {
            const btn = e.target.closest('.qbtn');
            if (!btn || isSending) return;
            const key = btn.dataset.key;
            if (!key) return;

            if (currentPrompt) {
                sendKey(key);
            } else if (terminalLive) {
                sendKeyDirect(key);
            }
        });

        function updateQuickbar() {
            if ((currentPrompt || terminalLive) && !showingHistory) {
                quickbar.classList.add('visible');
                requestAnimationFrame(() => {
                    if (fitAddon && xtermContainer.style.display !== 'none') fitAddon.fit();
                });
            } else {
                const wasVisible = quickbar.classList.contains('visible');
                quickbar.classList.remove('visible');
                if (wasVisible) {
                    requestAnimationFrame(() => {
                        if (fitAddon && xtermContainer.style.display !== 'none') fitAddon.fit();
                    });
                }
            }
        }

        // ── Toast ─────────────────────────────────────────────

        function showToast(msg, isError = false) {
            const t = document.createElement('div');
            t.className = 'toast' + (isError ? ' error' : '');
            t.textContent = msg;
            toastWrap.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // ── History ───────────────────────────────────────────

        function timeAgo(isoStr) {
            const diff = Date.now() - new Date(isoStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            return Math.floor(hrs / 24) + 'd ago';
        }

        async function showHistory() {
            showingHistory = true;
            updateQuickbar();
            xtermContainer.style.display = 'none';
            termContent.style.display = '';
            footerHint.textContent = 'back to live';

            try {
                const res = await fetch(`${API_BASE}/api/history?limit=20`);
                const data = await res.json();

                termContent.textContent = '';
                titleText.textContent = 'history';
                footerLeft.textContent = data.count + ' resolved';

                if (!data.success || data.history.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'history-empty';
                    empty.textContent = 'No history yet';
                    termContent.appendChild(empty);
                    return;
                }

                const list = document.createElement('div');
                list.className = 'history-list';

                for (const item of data.history) {
                    const el = document.createElement('div');
                    el.className = 'history-item';

                    const header = document.createElement('div');
                    header.className = 'history-header';

                    const event = document.createElement('span');
                    event.className = 'history-event ' + (item.event === 'permission_prompt' ? 'permission' : 'idle');
                    event.textContent = item.event === 'permission_prompt' ? 'permission' : 'idle';

                    const time = document.createElement('span');
                    time.className = 'history-time';
                    time.textContent = item.resolved_at ? timeAgo(item.resolved_at) : '';

                    header.appendChild(event);
                    header.appendChild(time);

                    const msg = document.createElement('div');
                    msg.className = 'history-message';
                    msg.textContent = (item.message || '').substring(0, 100);

                    el.appendChild(header);
                    el.appendChild(msg);

                    if (item.dismissed) {
                        const badge = document.createElement('span');
                        badge.className = 'history-response dismissed';
                        badge.textContent = 'dismissed';
                        el.appendChild(badge);
                    } else if (item.response) {
                        const badge = document.createElement('span');
                        badge.className = 'history-response';
                        badge.textContent = item.response;
                        el.appendChild(badge);
                    }

                    list.appendChild(el);
                }

                termContent.appendChild(list);
                termContent.scrollTop = 0;
            } catch {
                termContent.textContent = '';
                const err = document.createElement('div');
                err.className = 'history-empty';
                err.textContent = 'Failed to load history';
                termContent.appendChild(err);
            }
        }

        function hideHistory() {
            showingHistory = false;
            if (currentPrompt) {
                renderPromptOverlay();
            } else if (terminalLive) {
                // Restore watching state — show xterm, update chrome
                xtermContainer.style.display = '';
                termContent.style.display = 'none';
                initXterm();
                titleText.textContent = terminalSession || 'claude-remote';
                footerLeft.textContent = 'Watching session';
                footerHint.textContent = 'history';
                updateQuickbar();
                if (fitAddon) fitAddon.fit();
            } else {
                renderNoSession();
            }
        }

        // Footer hint toggles history
        footerHint.addEventListener('click', (e) => {
            e.stopPropagation();
            if (showingHistory) {
                hideHistory();
            } else {
                showHistory();
            }
        });

        // ── Search ───────────────────────────────────────────────

        function toggleSearch() {
            const isVisible = searchbar.classList.contains('visible');
            if (isVisible) {
                closeSearch();
            } else {
                searchbar.classList.add('visible');
                searchToggle.classList.add('active');
                searchInput.focus();
                if (fitAddon && xtermContainer.style.display !== 'none') {
                    requestAnimationFrame(() => fitAddon.fit());
                }
            }
        }

        function closeSearch() {
            searchbar.classList.remove('visible');
            searchToggle.classList.remove('active');
            searchInput.value = '';
            searchCount.textContent = '';
            searchResultCount = 0;
            searchResultIndex = -1;
            if (searchAddon) searchAddon.clearDecorations();
            if (fitAddon && xtermContainer.style.display !== 'none') {
                requestAnimationFrame(() => fitAddon.fit());
            }
        }

        function doSearch(direction = 'next') {
            if (!term) return;

            const query = searchInput.value;
            if (!query) {
                searchCount.textContent = '';
                if (searchAddon) searchAddon.clearDecorations();
                return;
            }

            // Try addon-based search first
            if (searchAddon) {
                let found;
                try {
                    if (direction === 'prev') {
                        found = searchAddon.findPrevious(query, { caseSensitive: false });
                    } else {
                        found = searchAddon.findNext(query, { caseSensitive: false });
                    }
                } catch (e) {
                    found = false;
                }

                if (found) {
                    searchCount.textContent = 'Found';
                    searchCount.style.color = 'var(--green)';
                    return;
                }
            }

            // Fallback: text search through raw content
            if (lastWrittenContent) {
                const clean = lastWrittenContent.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
                const idx = clean.toLowerCase().indexOf(query.toLowerCase());
                if (idx >= 0) {
                    searchCount.textContent = 'Found (text)';
                    searchCount.style.color = 'var(--green)';
                } else {
                    searchCount.textContent = 'No match';
                    searchCount.style.color = 'var(--text-muted)';
                }
            } else {
                searchCount.textContent = 'No match';
                searchCount.style.color = 'var(--text-muted)';
            }
        }

        searchToggle.addEventListener('click', toggleSearch);
        searchClose.addEventListener('click', closeSearch);

        searchInput.addEventListener('input', () => doSearch('next'));
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch(e.shiftKey ? 'prev' : 'next');
            } else if (e.key === 'Escape') {
                closeSearch();
            }
        });

        searchPrev.addEventListener('click', () => doSearch('prev'));
        searchNext.addEventListener('click', () => doSearch('next'));

        // ── Copy ─────────────────────────────────────────────────

        function copyTerminalContent() {
            if (!term) {
                showToast('No terminal content', true);
                return;
            }

            // Get selection or all visible content
            let text = term.getSelection();
            if (!text) {
                text = lastWrittenContent.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '');
            }

            if (!text) {
                showToast('Nothing to copy', true);
                return;
            }

            // Try Share API (works on iOS Safari over HTTP)
            if (navigator.share) {
                navigator.share({ text }).catch(() => {});
                return;
            }

            // Fallback: show selectable overlay
            showCopyOverlay(text);
        }

        function showCopyOverlay(text) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;padding:16px;';

            const header = document.createElement('div');
            header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;';

            const label = document.createElement('span');
            label.style.cssText = 'color:var(--text-dim);font-size:13px;';
            label.textContent = 'Long-press to select & copy';
            header.appendChild(label);

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '✕ Close';
            closeBtn.style.cssText = 'background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer;';
            closeBtn.onclick = () => overlay.remove();
            header.appendChild(closeBtn);

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.readOnly = true;
            textarea.style.cssText = 'flex:1;background:var(--bg-term);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:"JetBrains Mono",monospace;font-size:12px;line-height:1.5;resize:none;-webkit-user-select:text;user-select:text;';

            overlay.appendChild(header);
            overlay.appendChild(textarea);
            document.body.appendChild(overlay);

            // Auto-select all text
            textarea.focus();
            textarea.setSelectionRange(0, text.length);
        }

        copyBtn.addEventListener('click', copyTerminalContent);

        // ── Start ─────────────────────────────────────────────

        function start() {
            // Show initial state
            renderNoSession();

            connectWebSocket();

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    if (!ws || ws.readyState !== WebSocket.OPEN) {
                        clearTimeout(wsReconnectTimer);
                        wsReconnectDelay = WS_RECONNECT_BASE;
                        connectWebSocket();
                    }
                    poll();
                }
            });
        }

        start();
    </script>
</body>
</html>
