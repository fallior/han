<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Claude Remote</title>
    <!-- System monospace font — no CDN load needed -->
    <style>
        :root {
            --bg-term: #0a0e14;
            --bg-titlebar: #161b22;
            --border: rgba(48, 54, 61, 0.6);
            --text: #e6edf3;
            --text-dim: #8b949e;
            --text-muted: #484f58;
            --green: #3fb950;
            --cyan: #39d0d8;
            --amber: #d29922;
            --red: #f85149;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            background: #000;
            color: var(--text);
        }

        .app {
            height: 100%;
            display: flex;
            flex-direction: column;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Title bar */
        .titlebar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-titlebar);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .titlebar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .titlebar-dots {
            display: flex;
            gap: 6px;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-red { background: var(--red); }
        .dot-amber { background: var(--amber); }
        .dot-green { background: var(--green); }

        .titlebar-title {
            font-size: 12px;
            color: var(--text-dim);
            margin-left: 8px;
        }

        .titlebar-status {
            font-size: 11px;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Terminal pane */
        .terminal {
            flex: 1;
            background: var(--bg-term);
            overflow: hidden;
            position: relative;
        }

        .terminal-content {
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text);
            height: 100%;
            padding: 12px 16px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .terminal-content::-webkit-scrollbar { width: 6px; }
        .terminal-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Empty state */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            gap: 12px;
        }

        .empty-icon { font-size: 32px; opacity: 0.4; }
        .empty-title { font-size: 14px; }
        .empty-hint { font-size: 12px; color: var(--text-muted); }

        /* Toast */
        .toast-wrap {
            position: fixed;
            bottom: 160px;
            left: 50%; transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            padding: 8px 16px;
            background: var(--bg-titlebar);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--green);
            animation: fadeIn 0.2s ease-out;
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        .toast.error { color: var(--red); border-color: rgba(248,81,73,0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Footer */
        .footer {
            padding: 6px 16px;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
            background: var(--bg-titlebar);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .footer-hint { color: var(--text-dim); cursor: pointer; }
        .footer-hint:active { color: var(--cyan); }

        /* History view */
        .history-list {
            padding: 8px 0;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .history-item:last-child { border-bottom: none; }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .history-event {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-event.permission { color: var(--amber); }
        .history-event.idle { color: var(--text-dim); }

        .history-time {
            font-size: 10px;
            color: var(--text-muted);
        }

        .history-message {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .history-response {
            font-size: 11px;
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .history-response.dismissed {
            background: rgba(210, 153, 34, 0.15);
            color: var(--amber);
        }

        .history-back {
            text-align: center;
            padding: 12px;
            color: var(--cyan);
            font-size: 12px;
            cursor: pointer;
        }

        .history-back:active { opacity: 0.6; }

        .history-empty {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Quick-action keyboard bar */
        .quickbar {
            display: none;
            flex-shrink: 0;
            background: var(--bg-titlebar);
            border-top: 1px solid var(--border);
            padding: 6px 8px;
        }

        .quickbar.visible {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .quickbar-row {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .qbtn {
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 13px;
            font-weight: 500;
            min-width: 44px;
            min-height: 44px;
            padding: 0 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            flex: 1;
            max-width: 72px;
            transition: background 0.1s ease, border-color 0.1s ease;
        }

        .qbtn:active {
            background: rgba(57, 208, 216, 0.15);
            border-color: var(--cyan);
            color: var(--text);
        }

        .qbtn-primary {
            color: var(--green);
            border-color: rgba(63, 185, 80, 0.3);
            font-weight: 600;
            font-size: 14px;
        }

        .qbtn-primary:active {
            background: rgba(63, 185, 80, 0.2);
            border-color: var(--green);
        }

        .qbtn-dim { color: var(--text-muted); }

        .qbtn-special { font-size: 11px; }

        .qbtn-arrow {
            font-size: 16px;
            max-width: 44px;
            color: var(--text-muted);
        }

        .quickbar.sending .qbtn {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Search bar */
        .searchbar {
            display: none;
            background: var(--bg-titlebar);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .searchbar.visible { display: flex; }

        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 14px;
            color: var(--text);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--cyan);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
            min-width: 40px;
        }

        .search-btn:active {
            background: rgba(57, 208, 216, 0.15);
            border-color: var(--cyan);
        }

        .search-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .search-count {
            font-size: 11px;
            color: var(--text-muted);
            min-width: 50px;
            text-align: center;
        }

        /* Toolbar buttons in titlebar */
        .titlebar-tools {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tool-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 14px;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        .tool-btn:active {
            background: rgba(57, 208, 216, 0.15);
            color: var(--cyan);
        }

        .tool-btn.active {
            color: var(--cyan);
        }

        /* Bridge panel overlay */
        .bridge-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.92);
            flex-direction: column;
        }

        .bridge-overlay.visible {
            display: flex;
        }

        .bridge-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .bridge-tabs {
            display: flex;
            gap: 4px;
        }

        .bridge-tab {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 12px;
            padding: 6px 12px;
            cursor: pointer;
        }

        .bridge-tab.active {
            color: var(--cyan);
            border-color: var(--cyan);
            background: rgba(57, 208, 216, 0.1);
        }

        .bridge-tab:active { opacity: 0.7; }

        .bridge-close {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 13px;
            padding: 6px 12px;
            cursor: pointer;
        }

        .bridge-close:active { opacity: 0.7; }

        .bridge-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .bridge-section {
            display: none;
        }

        .bridge-section.active {
            display: block;
        }

        .bridge-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .bridge-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
            -webkit-appearance: none;
        }

        .bridge-textarea {
            width: 100%;
            min-height: 200px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.5;
            color: var(--text);
            resize: vertical;
            margin-bottom: 12px;
        }

        .bridge-textarea:focus {
            border-color: var(--cyan);
            outline: none;
        }

        .bridge-textarea::placeholder {
            color: var(--text-muted);
        }

        .bridge-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            margin-bottom: 12px;
        }

        .bridge-input:focus {
            border-color: var(--cyan);
            outline: none;
        }

        .bridge-input::placeholder { color: var(--text-muted); }

        .bridge-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--cyan);
            border-radius: 8px;
            background: rgba(57, 208, 216, 0.1);
            color: var(--cyan);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .bridge-btn:active { opacity: 0.7; }
        .bridge-btn:disabled { opacity: 0.4; pointer-events: none; }

        .bridge-btn-secondary {
            border-color: var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-dim);
        }

        .bridge-preview {
            background: var(--bg-term);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .bridge-history-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .bridge-history-item:last-child { border-bottom: none; }

        .bridge-history-type {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 4px;
        }

        .bridge-history-type.export {
            background: rgba(57, 208, 216, 0.15);
            color: var(--cyan);
        }

        .bridge-history-type.import {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .bridge-history-type.handoff {
            background: rgba(210, 153, 34, 0.15);
            color: var(--amber);
        }

        .bridge-history-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 2px;
        }

        .bridge-history-time {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* Task board */
        .task-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.92);
            flex-direction: column;
        }

        .task-overlay.visible { display: flex; }

        .task-status-badge {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        .task-status-badge.pending { background: rgba(210, 153, 34, 0.15); color: var(--amber); }
        .task-status-badge.running { background: rgba(57, 208, 216, 0.15); color: var(--cyan); animation: pulse 1.5s ease-in-out infinite; }
        .task-status-badge.done { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .task-status-badge.failed { background: rgba(248, 81, 73, 0.15); color: var(--red); }
        .task-status-badge.cancelled { background: rgba(72, 79, 88, 0.15); color: var(--text-muted); }

        .task-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .task-item:active { opacity: 0.7; }
        .task-item:last-child { border-bottom: none; }

        .task-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .task-item-title {
            font-size: 13px;
            color: var(--text);
            font-weight: 500;
        }

        .task-item-desc {
            font-size: 11px;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 4px;
        }

        .task-item-meta {
            font-size: 10px;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
        }

        .task-progress-log {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
            -webkit-overflow-scrolling: touch;
        }

        .task-progress-entry {
            padding: 6px 0;
            font-size: 12px;
            line-height: 1.5;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }

        .task-progress-entry:last-child { border-bottom: none; }

        .task-progress-entry .role {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .task-progress-entry .role.assistant { color: var(--cyan); }
        .task-progress-entry .role.tool { color: var(--amber); }
        .task-progress-entry .role.system { color: var(--text-muted); }

        .task-progress-entry .content {
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .task-summary {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .task-summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
        }

        .task-summary-label { color: var(--text-muted); }
        .task-summary-value { color: var(--text); }

        @supports (padding: max(0px)) {
            .titlebar { padding-top: max(8px, env(safe-area-inset-top)); }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="titlebar">
            <div class="titlebar-left">
                <div class="titlebar-dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-amber"></div>
                    <div class="dot dot-green"></div>
                </div>
                <span class="titlebar-title" id="titleText">claude-remote</span>
            </div>
            <div class="titlebar-tools">
                <button class="tool-btn" id="searchToggle" title="Search">🔍</button>
                <button class="tool-btn" id="copyBtn" title="Copy">📋</button>
                <button class="tool-btn" id="tasksBtn" title="Tasks">🤖</button>
                <button class="tool-btn" id="bridgeBtn" title="Bridge">🔗</button>
            </div>
            <div class="titlebar-status">
                <div class="status-dot"></div>
                <span id="statusText">connected</span>
            </div>
        </div>

        <div class="searchbar" id="searchbar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off" autocorrect="off" autocapitalize="off">
            <span class="search-count" id="searchCount"></span>
            <button class="search-btn" id="searchPrev">↑</button>
            <button class="search-btn" id="searchNext">↓</button>
            <button class="search-btn" id="searchClose">✕</button>
        </div>

        <div class="terminal" id="terminal">
            <div class="terminal-content" id="termContent"></div>
            <!-- Hidden input for iOS soft keyboard -->
            <input type="text" id="mobileInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                   style="position:absolute; bottom:10px; left:50%; width:1px; height:1px; opacity:0; font-size:16px; pointer-events:none;">
        </div>

        <div class="quickbar" id="quickbar">
            <div class="quickbar-row">
                <button class="qbtn qbtn-primary" data-key="y">y</button>
                <button class="qbtn qbtn-primary" data-key="n">n</button>
                <button class="qbtn qbtn-dim" data-key="1">1</button>
                <button class="qbtn qbtn-dim" data-key="2">2</button>
                <button class="qbtn qbtn-dim" data-key="3">3</button>
            </div>
            <div class="quickbar-row">
                <button class="qbtn qbtn-special" data-key="Enter">Enter</button>
                <button class="qbtn qbtn-special" data-key="Escape">Esc</button>
                <button class="qbtn qbtn-special" data-key="C-c">^C</button>
                <button class="qbtn qbtn-special" data-key="Tab">Tab</button>
                <button class="qbtn qbtn-arrow" data-key="Up">&uarr;</button>
                <button class="qbtn qbtn-arrow" data-key="Down">&darr;</button>
                <button class="qbtn qbtn-arrow" data-scroll="-5">&uarr;&uarr;</button>
                <button class="qbtn qbtn-arrow" data-scroll="5">&darr;&darr;</button>
            </div>
        </div>

        <div class="toast-wrap" id="toastWrap"></div>

        <div class="footer">
            <span id="footerLeft">No pending prompts</span>
            <span class="footer-hint" id="footerHint">tap terminal to type</span>
        </div>
    </div>

    <!-- Bridge overlay -->
    <div class="bridge-overlay" id="bridgeOverlay">
        <div class="bridge-header">
            <div class="bridge-tabs">
                <button class="bridge-tab active" data-tab="export">Export</button>
                <button class="bridge-tab" data-tab="import">Import</button>
                <button class="bridge-tab" data-tab="handoff">Handoff</button>
                <button class="bridge-tab" data-tab="history">History</button>
            </div>
            <button class="bridge-close" id="bridgeClose">✕</button>
        </div>
        <div class="bridge-body">
            <!-- Export tab -->
            <div class="bridge-section active" id="bridgeExport">
                <div class="bridge-label">Captures full scrollback and auto-saves</div>
                <button class="bridge-btn" id="exportSendBtn">Export & Send to Claude Code</button>
                <button class="bridge-btn bridge-btn-secondary" id="exportSaveBtn">Export & Save Only</button>
                <button class="bridge-btn bridge-btn-secondary" id="exportShareBtn" style="display:none;">Share Last Export</button>
                <div id="exportResult" style="display:none; margin-top:12px;">
                    <div class="bridge-label" id="exportResultLabel"></div>
                </div>
            </div>

            <!-- Import tab -->
            <div class="bridge-section" id="bridgeImport">
                <div class="bridge-label">Paste context from claude.ai or elsewhere</div>
                <textarea class="bridge-textarea" id="importContent" placeholder="Paste conversation, instructions, or context here..."></textarea>
                <input class="bridge-input" id="importLabel" placeholder="Label (optional)">
                <button class="bridge-btn" id="importSaveBtn">Save Context</button>

            </div>

            <!-- Handoff tab -->

                <div class="bridge-label">Additional context (optional)</div>
                <textarea class="bridge-textarea" id="handoffContext" placeholder="Paste relevant context..." style="min-height:100px;"></textarea>
                <div class="bridge-label">Working directory (optional)</div>
                <input class="bridge-input" id="handoffDir" placeholder="e.g. ~/Projects/myapp">

    <!-- Task board overlay -->
    <div class="task-overlay" id="taskOverlay">
        <div class="bridge-header">
            <div class="bridge-tabs">
                <button class="bridge-tab active" data-task-tab="list">Tasks</button>
                <button class="bridge-tab" data-task-tab="create">Create</button>
                <button class="bridge-tab" data-task-tab="detail" id="taskDetailTab" style="display:none">Progress</button>

            <button class="bridge-close" id="taskClose">✕</button>
        </div>
        <div class="bridge-body">
            <!-- Task list -->
            <div class="bridge-section active" id="taskList">
                <div id="taskListContent"></div>
            </div>

            <!-- Create task -->
            <div class="bridge-section" id="taskCreate">
                <div class="bridge-label">Title</div>
                <input class="bridge-input" id="taskTitle" placeholder="e.g. Add login page">
                <div class="bridge-label">Description</div>
                <textarea class="bridge-textarea" id="taskDesc" placeholder="Describe what Claude should do..." style="min-height:140px;"></textarea>
                <div class="bridge-label">Project path</div>
                <input class="bridge-input" id="taskPath" placeholder="e.g. /home/darron/Projects/myapp">
                <div style="display:flex;gap:8px;margin-bottom:12px;">
                    <div style="flex:1">
                        <div class="bridge-label">Model</div>
                        <select class="bridge-select" id="taskModel">
                            <option value="sonnet">Sonnet</option>
                            <option value="opus">Opus</option>
                            <option value="haiku">Haiku</option>
                        </select>
                    </div>
                    <div style="flex:1">
                        <div class="bridge-label">Max turns</div>
                        <input class="bridge-input" id="taskMaxTurns" type="number" value="100" min="1" max="1000" style="margin-bottom:0">
                    </div>
                </div>
                <button class="bridge-btn" id="taskCreateBtn">Create Task</button>
            </div>

            <!-- Task detail/progress -->
            <div class="bridge-section" id="taskDetail">
                <div id="taskDetailSummary"></div>
                <div class="task-progress-log" id="taskProgressLog"></div>
                <div id="taskDetailActions" style="margin-top:12px;"></div>
            </div>
        </div>
    </div>

    <script>
        const POLL_INTERVAL = 3000;
        const WS_RECONNECT_BASE = 1000;
        const WS_RECONNECT_MAX = 30000;
        const API_BASE = '';

        let currentPrompt = null;
        let pollTimer = null;
        let isSending = false;
        let userHasTapped = false;
        let showingHistory = false;
        let ws = null;
        let wsReconnectDelay = WS_RECONNECT_BASE;
        let wsReconnectTimer = null;
        let usingWebSocket = false;
        let terminalLive = false;
        let terminalSession = null;

        let lastWrittenContent = '';
        let localLineCount = 0;

        const terminal = document.getElementById('terminal');
        const termContent = document.getElementById('termContent');
        const mobileInput = document.getElementById('mobileInput');
        const titleText = document.getElementById('titleText');
        const statusText = document.getElementById('statusText');
        const footerLeft = document.getElementById('footerLeft');
        const footerHint = document.getElementById('footerHint');
        const toastWrap = document.getElementById('toastWrap');
        const quickbar = document.getElementById('quickbar');
        const statusDot = statusText.parentElement.querySelector('.status-dot');

        // Search elements
        const searchToggle = document.getElementById('searchToggle');
        const searchbar = document.getElementById('searchbar');
        const searchInput = document.getElementById('searchInput');
        const searchCount = document.getElementById('searchCount');
        const searchPrev = document.getElementById('searchPrev');
        const searchNext = document.getElementById('searchNext');
        const searchClose = document.getElementById('searchClose');
        const copyBtn = document.getElementById('copyBtn');

        // ── Prompt handling ───────────────────────────────────

        // Shared prompt update handler (used by both WS and HTTP)
        function handlePromptsUpdate(prompts) {
            if (prompts.length > 0) {
                const prompt = prompts[0];
                if (!currentPrompt || currentPrompt.id !== prompt.id) {
                    currentPrompt = prompt;
                    userHasTapped = false;
                    if (!showingHistory) renderPromptOverlay();
                } else {
                    currentPrompt = prompt;
                    if (!showingHistory) renderPromptOverlay();
                }
            } else if (currentPrompt) {
                currentPrompt = null;
                if (!showingHistory) {
                    if (terminalLive) {
                        // Return to watching state — update chrome only
                        footerLeft.textContent = 'Watching session';
                        footerHint.textContent = 'history';
                        updateQuickbar();
                    } else {
                        renderNoSession();
                    }
                }
            }

            statusDot.style.background = 'var(--green)';
        }

        // ── WebSocket ─────────────────────────────────────────

        function connectWebSocket() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${location.host}/ws`;

            try {
                ws = new WebSocket(wsUrl);
            } catch (e) {
                startPolling();
                return;
            }

            ws.onopen = () => {
                usingWebSocket = true;
                wsReconnectDelay = WS_RECONNECT_BASE;
                stopPolling();
                statusText.textContent = 'live';
                statusDot.style.background = 'var(--green)';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'prompts') {
                        handlePromptsUpdate(data.prompts);
                    } else if (data.type === 'terminal') {
                        handleTerminalUpdate(data.content, data.session);
                    } else if (data.type === 'task_update') {
                        handleTaskUpdate(data.task);
                    } else if (data.type === 'task_progress') {
                        handleTaskProgressMessage(data);
                    }
                } catch (e) {
                    console.error('WS parse error:', e);
                }
            };

            ws.onclose = () => {
                usingWebSocket = false;
                ws = null;
                statusText.textContent = 'polling';
                startPolling();

                wsReconnectTimer = setTimeout(() => {
                    wsReconnectDelay = Math.min(wsReconnectDelay * 2, WS_RECONNECT_MAX);
                    connectWebSocket();
                }, wsReconnectDelay);
            };

            ws.onerror = () => {};
        }

        // ── HTTP polling (fallback) ──────────────────────────

        async function poll() {
            if (usingWebSocket) return;

            try {
                const res = await fetch(`${API_BASE}/api/prompts`);
                const data = await res.json();
                if (data.success) handlePromptsUpdate(data.prompts);
            } catch {
                statusText.textContent = 'disconnected';
                statusDot.style.background = 'var(--red)';
            }
        }

        function startPolling() {
            if (pollTimer) return;
            poll();
            pollTimer = setInterval(poll, POLL_INTERVAL);
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        // ── Terminal broadcast handling ────────────────────────

        let renderedLines = []; // current line elements in the DOM

        function diffUpdateTerminal(newContent) {
            const newLines = newContent.split('\n');
            const el = termContent;
            const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 50;

            // Update changed lines, add new lines, remove excess lines
            for (let i = 0; i < newLines.length; i++) {
                if (i < renderedLines.length) {
                    // Existing line — only update if changed
                    if (renderedLines[i]._text !== newLines[i]) {
                        renderedLines[i].textContent = newLines[i];
                        renderedLines[i]._text = newLines[i];
                    }
                } else {
                    // New line — append
                    const div = document.createElement('div');
                    div.textContent = newLines[i];
                    div._text = newLines[i];
                    el.appendChild(div);
                    renderedLines.push(div);
                }
            }

            // Remove excess lines from the end
            while (renderedLines.length > newLines.length) {
                el.removeChild(renderedLines.pop());
            }

            if (wasAtBottom) {
                el.scrollTop = el.scrollHeight;
            }
        }

        function clearRenderedLines() {
            renderedLines = [];
            termContent.innerHTML = '';
        }

        function handleTerminalUpdate(content, session) {
            if (content === null) {
                // No active session
                terminalLive = false;
                terminalSession = null;
                if (!showingHistory && !currentPrompt) renderNoSession();
                return;
            }

            terminalLive = true;
            terminalSession = session;

            if (showingHistory) return;

            // Use plain text div — native scrolling works on mobile
            termContent.style.display = '';

            // Only update DOM if content actually changed
            if (content !== lastWrittenContent) {
                lastWrittenContent = content;
                localLineCount = content.split('\n').length;

                // Diff-based update — only touches changed lines
                diffUpdateTerminal(content);
            }

            // Update chrome based on state
            titleText.textContent = session || 'claude-remote';
            if (!currentPrompt) {
                footerLeft.textContent = `Watching (${localLineCount} lines)`;
                footerHint.textContent = 'history';
                updateQuickbar();
            }
        }

        // ── Rendering ─────────────────────────────────────────

        function renderPromptOverlay() {
            const p = currentPrompt;

            // If terminal broadcast hasn't started yet, show prompt's terminal content
            if (!terminalLive) {
                const content = (p.terminal || p.terminal_content || '').trim();
                termContent.style.display = '';
                if (content && content !== lastWrittenContent) {
                    lastWrittenContent = content;
                    diffUpdateTerminal(content);
                }
            }

            // Update chrome for prompt state
            const session = p.tmux_session || terminalSession || 'claude-remote';
            titleText.textContent = session;
            footerLeft.textContent = p.event === 'permission_prompt' ? 'Permission required' : 'Waiting for input';
            footerHint.textContent = 'tap to type \u00b7 keys sent to session';
            updateQuickbar();
        }

        function renderNoSession() {
            termContent.style.display = '';
            lastWrittenContent = '';

            clearRenderedLines();
            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.innerHTML = '<div class="empty-icon">\u25c7</div>'
                + '<div class="empty-title">No active session</div>'
                + '<div class="empty-hint">Start a claude-remote session to begin</div>';
            termContent.appendChild(empty);

            titleText.textContent = 'claude-remote';
            footerLeft.textContent = 'No active session';
            footerHint.textContent = 'history';
            updateQuickbar();
        }

        // ── Input ─────────────────────────────────────────────

        async function sendKey(key) {
            if (!currentPrompt || isSending) return;
            isSending = true;
            quickbar.classList.add('sending');

            try {
                const res = await fetch(`${API_BASE}/api/respond`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentPrompt.id,
                        response: key,
                        noEnter: true
                    })
                });

                const data = await res.json();
                if (data.success) {
                    showToast('Sent: ' + (key || 'Enter'));
                    currentPrompt = null;
                    if (!showingHistory) {
                        if (terminalLive) {
                            footerLeft.textContent = 'Watching session';
                            footerHint.textContent = 'history';
                            updateQuickbar();
                        } else {
                            renderNoSession();
                        }
                    }
                    if (!usingWebSocket) setTimeout(poll, 1000);
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch (err) {
                showToast('Connection error', true);
            } finally {
                isSending = false;
                quickbar.classList.remove('sending');
            }
        }

        async function sendKeyDirect(key) {
            if (!terminalLive || isSending) return;
            isSending = true;

            try {
                const res = await fetch(`${API_BASE}/api/keys`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await res.json();
                if (!data.success) {
                    showToast(data.error || 'Failed', true);
                }
            } catch {
                showToast('Connection error', true);
            } finally {
                isSending = false;
            }
        }

        // Focus management — require explicit tap
        // Use hidden input for iOS soft keyboard
        terminal.addEventListener('click', () => {
            userHasTapped = true;
            // Focus hidden input to trigger iOS keyboard
            mobileInput.focus();
            showToast('Keyboard active');
        });

        // Client-side echo — show characters instantly, send to server in background
        function localEcho(char) {
            if (renderedLines.length === 0) return;
            const lastDiv = renderedLines[renderedLines.length - 1];
            lastDiv.textContent += char;
            lastDiv._text = lastDiv.textContent;
            termContent.scrollTop = termContent.scrollHeight;
        }

        function localEchoNewline() {
            const div = document.createElement('div');
            div.textContent = '';
            div._text = '';
            termContent.appendChild(div);
            renderedLines.push(div);
            termContent.scrollTop = termContent.scrollHeight;
        }

        function localEchoBackspace() {
            if (renderedLines.length === 0) return;
            const lastDiv = renderedLines[renderedLines.length - 1];
            if (lastDiv._text.length > 0) {
                lastDiv.textContent = lastDiv._text.slice(0, -1);
                lastDiv._text = lastDiv.textContent;
            }
        }

        // Handle input from iOS soft keyboard
        mobileInput.addEventListener('input', (e) => {
            const value = e.target.value;
            if (!value) return;
            mobileInput.value = '';

            // Show instantly on client
            localEcho(value);

            // Send to server in background
            if (currentPrompt) {
                sendKey(value);
            } else if (terminalLive) {
                sendKeyDirect(value);
            }
        });

        // Handle special keys
        mobileInput.addEventListener('keydown', (e) => {
            let key = null;

            if (e.key === 'Enter') {
                key = 'Enter';
                localEchoNewline();
                e.preventDefault();
            } else if (e.key === 'Backspace') {
                key = '\x7f';
                localEchoBackspace();
                e.preventDefault();
            } else if (e.key === 'Escape') {
                key = 'Escape';
                e.preventDefault();
            }

            if (key) {
                if (currentPrompt) {
                    sendKey(key);
                } else if (terminalLive) {
                    sendKeyDirect(key);
                }
            }
        });

        // ── Quick-action bar ──────────────────────────────────

        quickbar.addEventListener('click', (e) => {
            const btn = e.target.closest('.qbtn');
            if (!btn) return;

            // Handle scroll buttons (scroll the plain text div)
            const scroll = btn.dataset.scroll;
            if (scroll) {
                const pages = parseInt(scroll);
                termContent.scrollTop += pages * termContent.clientHeight;
                return;
            }

            if (isSending) return;
            const key = btn.dataset.key;
            if (!key) return;

            if (currentPrompt) {
                sendKey(key);
            } else if (terminalLive) {
                sendKeyDirect(key);
            }
        });

        function updateQuickbar() {
            if ((currentPrompt || terminalLive) && !showingHistory) {
                quickbar.classList.add('visible');
            } else {
                quickbar.classList.remove('visible');
            }
        }

        // ── Toast ─────────────────────────────────────────────

        function showToast(msg, isError = false) {
            const t = document.createElement('div');
            t.className = 'toast' + (isError ? ' error' : '');
            t.textContent = msg;
            toastWrap.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // ── History ───────────────────────────────────────────

        function timeAgo(isoStr) {
            const diff = Date.now() - new Date(isoStr).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            return Math.floor(hrs / 24) + 'd ago';
        }

        async function showHistory() {
            showingHistory = true;
            updateQuickbar();
            termContent.style.display = '';
            footerHint.textContent = 'back to live';

            try {
                const res = await fetch(`${API_BASE}/api/history?limit=20`);
                const data = await res.json();

                clearRenderedLines();
                titleText.textContent = 'history';
                footerLeft.textContent = data.count + ' resolved';

                if (!data.success || data.history.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'history-empty';
                    empty.textContent = 'No history yet';
                    termContent.appendChild(empty);
                    return;
                }

                const list = document.createElement('div');
                list.className = 'history-list';

                for (const item of data.history) {
                    const el = document.createElement('div');
                    el.className = 'history-item';

                    const header = document.createElement('div');
                    header.className = 'history-header';

                    const event = document.createElement('span');
                    event.className = 'history-event ' + (item.event === 'permission_prompt' ? 'permission' : 'idle');
                    event.textContent = item.event === 'permission_prompt' ? 'permission' : 'idle';

                    const time = document.createElement('span');
                    time.className = 'history-time';
                    time.textContent = item.resolved_at ? timeAgo(item.resolved_at) : '';

                    header.appendChild(event);
                    header.appendChild(time);

                    const msg = document.createElement('div');
                    msg.className = 'history-message';
                    msg.textContent = (item.message || '').substring(0, 100);

                    el.appendChild(header);
                    el.appendChild(msg);

                    if (item.dismissed) {
                        const badge = document.createElement('span');
                        badge.className = 'history-response dismissed';
                        badge.textContent = 'dismissed';
                        el.appendChild(badge);
                    } else if (item.response) {
                        const badge = document.createElement('span');
                        badge.className = 'history-response';
                        badge.textContent = item.response;
                        el.appendChild(badge);
                    }

                    list.appendChild(el);
                }

                termContent.appendChild(list);
                termContent.scrollTop = 0;
            } catch {
                clearRenderedLines();
                const err = document.createElement('div');
                err.className = 'history-empty';
                err.textContent = 'Failed to load history';
                termContent.appendChild(err);
            }
        }

        function hideHistory() {
            showingHistory = false;
            if (currentPrompt) {
                renderPromptOverlay();
            } else if (terminalLive) {
                // Restore watching state — rebuild from last content
                clearRenderedLines();
                termContent.style.display = '';
                if (lastWrittenContent) {
                    diffUpdateTerminal(lastWrittenContent);
                }
                titleText.textContent = terminalSession || 'claude-remote';
                footerLeft.textContent = 'Watching session';
                footerHint.textContent = 'history';
                updateQuickbar();
            } else {
                renderNoSession();
            }
        }

        // Footer hint toggles history
        footerHint.addEventListener('click', (e) => {
            e.stopPropagation();
            if (showingHistory) {
                hideHistory();
            } else {
                showHistory();
            }
        });

        // ── Search ───────────────────────────────────────────────

        function toggleSearch() {
            const isVisible = searchbar.classList.contains('visible');
            if (isVisible) {
                closeSearch();
            } else {
                searchbar.classList.add('visible');
                searchToggle.classList.add('active');
                searchInput.focus();
            }
        }

        function closeSearch() {
            searchbar.classList.remove('visible');
            searchToggle.classList.remove('active');
            searchInput.value = '';
            searchCount.textContent = '';
            searchMatches = [];
            searchMatchIdx = -1;
        }

        let searchMatches = [];
        let searchMatchIdx = -1;

        function doSearch(direction = 'next') {
            const query = searchInput.value.toLowerCase();
            if (!query || !lastWrittenContent) {
                searchCount.textContent = '';
                searchMatches = [];
                searchMatchIdx = -1;
                return;
            }

            const text = lastWrittenContent.toLowerCase();

            // Find all match positions
            searchMatches = [];
            let pos = 0;
            while ((pos = text.indexOf(query, pos)) !== -1) {
                searchMatches.push(pos);
                pos += query.length;
            }

            if (searchMatches.length === 0) {
                searchCount.textContent = 'No match';
                searchCount.style.color = 'var(--text-muted)';
                searchMatchIdx = -1;
                return;
            }

            // Navigate
            if (direction === 'next') {
                searchMatchIdx = (searchMatchIdx + 1) % searchMatches.length;
            } else {
                searchMatchIdx = searchMatchIdx <= 0 ? searchMatches.length - 1 : searchMatchIdx - 1;
            }

            searchCount.textContent = `${searchMatchIdx + 1}/${searchMatches.length}`;
            searchCount.style.color = 'var(--green)';

            // Scroll to match — find the line number and scroll to it
            const beforeMatch = lastWrittenContent.substring(0, searchMatches[searchMatchIdx]);
            const lineNum = beforeMatch.split('\n').length - 1;
            const lineHeight = parseFloat(getComputedStyle(termContent).lineHeight) || 20;
            termContent.scrollTop = lineNum * lineHeight - termContent.clientHeight / 2;
        }

        searchToggle.addEventListener('click', toggleSearch);
        searchClose.addEventListener('click', closeSearch);

        searchInput.addEventListener('input', () => doSearch('next'));
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                doSearch(e.shiftKey ? 'prev' : 'next');
            } else if (e.key === 'Escape') {
                closeSearch();
            }
        });

        searchPrev.addEventListener('click', () => doSearch('prev'));
        searchNext.addEventListener('click', () => doSearch('next'));

        // ── Copy ─────────────────────────────────────────────────

        function copyTerminalContent() {
            const text = lastWrittenContent || '';
            if (!text) {
                showToast('Nothing to copy', true);
                return;
            }

            // Try Share API (works on iOS Safari over HTTP)
            if (navigator.share) {
                navigator.share({ text }).catch(() => {});
                return;
            }

            // Fallback: show selectable overlay
            showCopyOverlay(text);
        }

        function showCopyOverlay(text) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;padding:16px;';

            const header = document.createElement('div');
            header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;';

            const label = document.createElement('span');
            label.style.cssText = 'color:var(--text-dim);font-size:13px;';
            label.textContent = 'Long-press to select & copy';
            header.appendChild(label);

            const closeBtn = document.createElement('button');
            closeBtn.textContent = '✕ Close';
            closeBtn.style.cssText = 'background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer;';
            closeBtn.onclick = () => overlay.remove();
            header.appendChild(closeBtn);

            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.readOnly = true;
            textarea.style.cssText = 'flex:1;background:var(--bg-term);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:12px;line-height:1.5;resize:none;-webkit-user-select:text;user-select:text;';

            overlay.appendChild(header);
            overlay.appendChild(textarea);
            document.body.appendChild(overlay);

            // Auto-select all text
            textarea.focus();
            textarea.setSelectionRange(0, text.length);
        }

        copyBtn.addEventListener('click', copyTerminalContent);

        // ── Bridge ────────────────────────────────────────────

        const bridgeBtn = document.getElementById('bridgeBtn');
        const bridgeOverlay = document.getElementById('bridgeOverlay');
        const bridgeClose = document.getElementById('bridgeClose');
        const exportSendBtn = document.getElementById('exportSendBtn');
        const exportSaveBtn = document.getElementById('exportSaveBtn');
        const exportShareBtn = document.getElementById('exportShareBtn');
        const exportResult = document.getElementById('exportResult');
        const exportResultLabel = document.getElementById('exportResultLabel');
        const importContent = document.getElementById('importContent');
        const importLabel = document.getElementById('importLabel');
        const importSaveBtn = document.getElementById('importSaveBtn');
        const importInjectBtn = document.getElementById('importInjectBtn');
        const handoffTask = document.getElementById('handoffTask');
        const handoffContext = document.getElementById('handoffContext');
        const handoffDir = document.getElementById('handoffDir');
        const handoffBtn = document.getElementById('handoffBtn');
        const bridgeHistoryList = document.getElementById('bridgeHistoryList');

        let lastExportContent = '';

        function openBridge() {
            bridgeOverlay.classList.add('visible');
            bridgeBtn.classList.add('active');
        }

        function closeBridge() {
            bridgeOverlay.classList.remove('visible');
            bridgeBtn.classList.remove('active');
        }

        function switchBridgeTab(tab) {
            bridgeOverlay.querySelectorAll('.bridge-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });
            bridgeOverlay.querySelectorAll('.bridge-section').forEach(s => {
                s.classList.remove('active');
            });
            document.getElementById('bridge' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

            if (tab === 'history') loadBridgeHistory();
        }

        bridgeBtn.addEventListener('click', () => {
            if (bridgeOverlay.classList.contains('visible')) {
                closeBridge();
            } else {
                openBridge();
            }
        });

        bridgeClose.addEventListener('click', closeBridge);

        bridgeOverlay.querySelector('.bridge-tabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.bridge-tab');
            if (tab) switchBridgeTab(tab.dataset.tab);
        });

        // Export
        async function doExport(inject) {
            const btn = inject ? exportSendBtn : exportSaveBtn;
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = inject ? 'Exporting & sending...' : 'Exporting...';

            try {
                const url = `${API_BASE}/api/bridge/export` + (inject ? '?inject=true' : '');
                const res = await fetch(url);
                const data = await res.json();
                if (data.success) {
                    lastExportContent = data.content;
                    exportResult.style.display = '';
                    exportResultLabel.textContent = `Saved: ${data.filename} (${data.lineCount} lines)` + (data.injected ? ' — sent to Claude Code' : '');
                    exportShareBtn.style.display = '';
                    showToast(inject ? `Exported & sent (${data.lineCount} lines)` : `Exported (${data.lineCount} lines)`);
                } else {
                    showToast(data.error || 'Export failed', true);
                }
            } catch {
                showToast('Connection error', true);
            } finally {
                btn.disabled = false;
                btn.textContent = origText;
            }
        }

        exportSendBtn.addEventListener('click', () => doExport(true));
        exportSaveBtn.addEventListener('click', () => doExport(false));

        exportShareBtn.addEventListener('click', () => {
            if (!lastExportContent) return;
            if (navigator.share) {
                navigator.share({ text: lastExportContent }).catch(() => {});
            } else {
                showCopyOverlay(lastExportContent);
            }
        });

        // Import
        async function doImport(inject) {
            const content = importContent.value.trim();
            if (!content) {
                showToast('Paste some content first', true);
                return;
            }

            const btn = inject ? importInjectBtn : importSaveBtn;
            btn.disabled = true;
            btn.textContent = inject ? 'Sending...' : 'Saving...';

            try {
                const res = await fetch(`${API_BASE}/api/bridge/import`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content,
                        label: importLabel.value.trim() || undefined,
                        inject
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(inject ? 'Sent to Claude Code' : 'Context saved');
                    importContent.value = '';
                    importLabel.value = '';
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch {
                showToast('Connection error', true);
            } finally {
                btn.disabled = false;
                btn.textContent = inject ? 'Save & Send to Claude Code' : 'Save Context';
            }
        }

        importSaveBtn.addEventListener('click', () => doImport(false));
        importInjectBtn.addEventListener('click', () => doImport(true));

        // Handoff
        handoffBtn.addEventListener('click', async () => {
            const task = handoffTask.value.trim();
            if (!task) {
                showToast('Describe the task first', true);
                return;
            }

            handoffBtn.disabled = true;
            handoffBtn.textContent = 'Handing off...';

            try {
                const res = await fetch(`${API_BASE}/api/bridge/handoff`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task,
                        context: handoffContext.value.trim() || undefined,
                        workingDir: handoffDir.value.trim() || undefined
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.injected ? 'Handed off to Claude Code' : 'Saved (no active session)');
                    handoffTask.value = '';
                    handoffContext.value = '';
                    handoffDir.value = '';
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch {
                showToast('Connection error', true);
            } finally {
                handoffBtn.disabled = false;
                handoffBtn.textContent = 'Hand Off to Claude Code';
            }
        });

        // Bridge history
        async function loadBridgeHistory() {
            bridgeHistoryList.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">Loading...</div>';
            try {
                const res = await fetch(`${API_BASE}/api/bridge/history?limit=30`);
                const data = await res.json();

                if (!data.success || data.history.length === 0) {
                    bridgeHistoryList.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;">No bridge activity yet</div>';
                    return;
                }

                bridgeHistoryList.innerHTML = '';
                for (const item of data.history) {
                    const el = document.createElement('div');
                    el.className = 'bridge-history-item';

                    const badge = document.createElement('span');
                    badge.className = 'bridge-history-type ' + (item.type || 'export');
                    badge.textContent = item.type || 'event';

                    const label = document.createElement('div');
                    label.className = 'bridge-history-label';
                    label.textContent = item.label || '';

                    const time = document.createElement('div');
                    time.className = 'bridge-history-time';
                    time.textContent = item.timestamp ? timeAgo(item.timestamp) : '';

                    el.appendChild(badge);
                    el.appendChild(label);
                    el.appendChild(time);
                    bridgeHistoryList.appendChild(el);
                }
            } catch {
                bridgeHistoryList.innerHTML = '<div style="text-align:center;color:var(--red);padding:20px;">Failed to load</div>';
            }
        }

        // ── Tasks ─────────────────────────────────────────────

        const tasksBtn = document.getElementById('tasksBtn');
        const taskOverlay = document.getElementById('taskOverlay');
        const taskClose = document.getElementById('taskClose');
        const taskListContent = document.getElementById('taskListContent');
        const taskDetailTab = document.getElementById('taskDetailTab');
        const taskDetailSummary = document.getElementById('taskDetailSummary');
        const taskProgressLog = document.getElementById('taskProgressLog');
        const taskDetailActions = document.getElementById('taskDetailActions');

        let allTasks = [];
        let viewingTaskId = null;
        let taskProgressEntries = []; // accumulated progress for the viewed task

        function openTasks() {
            taskOverlay.classList.add('visible');
            tasksBtn.classList.add('active');
            loadTasks();
        }

        function closeTasks() {
            taskOverlay.classList.remove('visible');
            tasksBtn.classList.remove('active');
        }

        function switchTaskTab(tab) {
            taskOverlay.querySelectorAll('[data-task-tab]').forEach(t => {
                t.classList.toggle('active', t.dataset.taskTab === tab);
            });
            taskOverlay.querySelectorAll('.bridge-section').forEach(s => s.classList.remove('active'));
            if (tab === 'list') document.getElementById('taskList').classList.add('active');
            else if (tab === 'create') document.getElementById('taskCreate').classList.add('active');
            else if (tab === 'detail') document.getElementById('taskDetail').classList.add('active');

            if (tab === 'list') loadTasks();
        }

        tasksBtn.addEventListener('click', () => {
            if (taskOverlay.classList.contains('visible')) closeTasks();
            else openTasks();
        });

        taskClose.addEventListener('click', closeTasks);

        taskOverlay.querySelector('.bridge-tabs').addEventListener('click', (e) => {
            const tab = e.target.closest('[data-task-tab]');
            if (tab && tab.style.display !== 'none') switchTaskTab(tab.dataset.taskTab);
        });

        // Load task list
        async function loadTasks() {
            taskListContent.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px;">Loading...</div>';
            try {
                const res = await fetch(`${API_BASE}/api/tasks`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                allTasks = data.tasks;
                renderTaskList();
            } catch (err) {
                taskListContent.innerHTML = `<div style="text-align:center;color:var(--red);padding:20px;">${err.message}</div>`;
            }
        }

        function renderTaskList() {
            if (allTasks.length === 0) {
                taskListContent.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;">No tasks yet<br><span style="font-size:11px;">Tap Create to add one</span></div>';
                return;
            }

            taskListContent.innerHTML = '';
            for (const task of allTasks) {
                const el = document.createElement('div');
                el.className = 'task-item';

                const header = document.createElement('div');
                header.className = 'task-item-header';

                const title = document.createElement('span');
                title.className = 'task-item-title';
                title.textContent = task.title;

                const badge = document.createElement('span');
                badge.className = 'task-status-badge ' + task.status;
                badge.textContent = task.status;

                header.appendChild(title);
                header.appendChild(badge);

                const desc = document.createElement('div');
                desc.className = 'task-item-desc';
                desc.textContent = task.description.substring(0, 100);

                const meta = document.createElement('div');
                meta.className = 'task-item-meta';
                meta.innerHTML = `<span>${task.model}</span>`;
                if (task.cost_usd > 0) meta.innerHTML += `<span>$${task.cost_usd.toFixed(4)}</span>`;
                if (task.turns > 0) meta.innerHTML += `<span>${task.turns} turns</span>`;
                if (task.created_at) meta.innerHTML += `<span>${timeAgo(task.created_at)}</span>`;

                el.appendChild(header);
                el.appendChild(desc);
                el.appendChild(meta);

                el.addEventListener('click', () => viewTask(task.id));
                taskListContent.appendChild(el);
            }
        }

        // View task detail
        async function viewTask(taskId) {
            viewingTaskId = taskId;
            taskProgressEntries = [];
            taskDetailTab.style.display = '';
            switchTaskTab('detail');

            const task = allTasks.find(t => t.id === taskId);
            if (!task) return;

            renderTaskDetail(task);
        }

        function renderTaskDetail(task) {
            // Summary
            let summaryHtml = '<div class="task-summary">';
            summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Status</span><span class="task-status-badge ${task.status}">${task.status}</span></div>`;
            summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Title</span><span class="task-summary-value">${escHtml(task.title)}</span></div>`;
            summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Model</span><span class="task-summary-value">${task.model}</span></div>`;
            if (task.cost_usd > 0) summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Cost</span><span class="task-summary-value">$${task.cost_usd.toFixed(4)}</span></div>`;
            if (task.turns > 0) summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Turns</span><span class="task-summary-value">${task.turns}</span></div>`;
            if (task.tokens_in > 0) summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Tokens</span><span class="task-summary-value">${(task.tokens_in + task.tokens_out).toLocaleString()}</span></div>`;
            if (task.started_at) summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Started</span><span class="task-summary-value">${timeAgo(task.started_at)}</span></div>`;
            if (task.completed_at) summaryHtml += `<div class="task-summary-row"><span class="task-summary-label">Completed</span><span class="task-summary-value">${timeAgo(task.completed_at)}</span></div>`;
            summaryHtml += '</div>';

            if (task.result) {
                summaryHtml += '<div class="bridge-label">Result</div>';
                summaryHtml += `<div class="bridge-preview">${escHtml(task.result)}</div>`;
            }
            if (task.error) {
                summaryHtml += '<div class="bridge-label" style="color:var(--red)">Error</div>';
                summaryHtml += `<div class="bridge-preview" style="border-color:rgba(248,81,73,0.3)">${escHtml(task.error)}</div>`;
            }

            taskDetailSummary.innerHTML = summaryHtml;

            // Actions
            let actionsHtml = '';
            if (task.status === 'pending' || task.status === 'running') {
                actionsHtml += `<button class="bridge-btn" style="border-color:var(--red);color:var(--red);background:rgba(248,81,73,0.1);" onclick="cancelTask('${task.id}')">Cancel Task</button>`;
            }
            if (task.status !== 'running') {
                actionsHtml += `<button class="bridge-btn bridge-btn-secondary" onclick="deleteTask('${task.id}')">Delete Task</button>`;
            }
            taskDetailActions.innerHTML = actionsHtml;
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Handle real-time task updates from WebSocket
        function handleTaskUpdate(task) {
            // Update in allTasks
            const idx = allTasks.findIndex(t => t.id === task.id);
            if (idx >= 0) {
                if (task.status === 'deleted') {
                    allTasks.splice(idx, 1);
                } else {
                    allTasks[idx] = task;
                }
            } else if (task.status !== 'deleted') {
                allTasks.unshift(task);
            }

            // Re-render list if visible
            if (taskOverlay.classList.contains('visible')) {
                const listActive = document.getElementById('taskList').classList.contains('active');
                if (listActive) renderTaskList();
            }

            // Update detail view if viewing this task
            if (viewingTaskId === task.id) {
                renderTaskDetail(task);
            }
        }

        function handleTaskProgressMessage(data) {
            if (data.taskId !== viewingTaskId) return;

            const entry = document.createElement('div');
            entry.className = 'task-progress-entry';

            const role = document.createElement('div');
            role.className = 'role';

            const content = document.createElement('div');
            content.className = 'content';

            if (data.messageType === 'assistant' || data.role === 'assistant') {
                role.className += ' assistant';
                role.textContent = 'assistant';
                content.textContent = data.text || '';
            } else if (data.messageType === 'tool_use_summary') {
                role.className += ' tool';
                role.textContent = data.tool || 'tool';
                content.textContent = data.input || '';
            } else if (data.messageType === 'result') {
                role.className += ' system';
                role.textContent = data.subtype === 'success' ? 'completed' : 'error';
                content.textContent = data.result || '';
                if (data.cost_usd) content.textContent += `\nCost: $${data.cost_usd.toFixed(4)} | Turns: ${data.num_turns || 0}`;
            } else if (data.messageType === 'system') {
                role.className += ' system';
                role.textContent = 'system';
                content.textContent = data.subtype || '';
            } else {
                return; // Skip unknown types
            }

            entry.appendChild(role);
            entry.appendChild(content);
            taskProgressLog.appendChild(entry);

            // Auto-scroll to bottom
            taskProgressLog.scrollTop = taskProgressLog.scrollHeight;
        }

        // Create task
        document.getElementById('taskCreateBtn').addEventListener('click', async () => {
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDesc').value.trim();
            const project_path = document.getElementById('taskPath').value.trim();
            const model = document.getElementById('taskModel').value;
            const max_turns = parseInt(document.getElementById('taskMaxTurns').value) || 100;

            if (!title || !description || !project_path) {
                showToast('Fill in title, description, and project path', true);
                return;
            }

            const btn = document.getElementById('taskCreateBtn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const res = await fetch(`${API_BASE}/api/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, project_path, model, max_turns })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Task created');
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskDesc').value = '';
                    switchTaskTab('list');
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch {
                showToast('Connection error', true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Task';
            }
        });

        // Cancel task
        async function cancelTask(id) {
            try {
                const res = await fetch(`${API_BASE}/api/tasks/${id}/cancel`, { method: 'POST' });
                const data = await res.json();
                if (data.success) showToast('Task cancelled');
                else showToast(data.error || 'Failed', true);
            } catch {
                showToast('Connection error', true);
            }
        }

        // Delete task
        async function deleteTask(id) {
            try {
                const res = await fetch(`${API_BASE}/api/tasks/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    showToast('Task deleted');
                    viewingTaskId = null;
                    taskDetailTab.style.display = 'none';
                    switchTaskTab('list');
                } else {
                    showToast(data.error || 'Failed', true);
                }
            } catch {
                showToast('Connection error', true);
            }
        }

        // ── Start ─────────────────────────────────────────────

        async function loadPersistedTerminal() {
            try {
                const res = await fetch(`${API_BASE}/api/terminal`);
                const data = await res.json();
                if (data.success && data.content) {
                    handleTerminalUpdate(data.content, 'claude-remote');
                }
            } catch { /* WebSocket will pick up shortly */ }
        }

        function start() {
            // Load persisted terminal content immediately (before WebSocket connects)
            loadPersistedTerminal();

            connectWebSocket();

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    if (!ws || ws.readyState !== WebSocket.OPEN) {
                        clearTimeout(wsReconnectTimer);
                        wsReconnectDelay = WS_RECONNECT_BASE;
                        connectWebSocket();
                    }
                    poll();
                }
            });
        }

        start();
    </script>
</body>
</html>
